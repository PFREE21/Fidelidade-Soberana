<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidelidade Soberana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; padding-bottom: 70px; }
        .header { background: #0d3b2e; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo { width: 42px; height: 42px; background: #166534; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }
        .header-right { text-align: right; font-size: 14px; }
        .header-right .name { font-weight: 600; }
        .header-right .since { font-size: 12px; opacity: 0.75; }
        .success-banner { background: #10b981; color: white; margin: 16px; padding: 14px 18px; border-radius: 16px; display: flex; align-items: flex-start; gap: 12px; }
        .success-banner .icon { width: 28px; height: 28px; background: rgba(255,255,255,0.25); border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .success-banner .content { flex: 1; font-size: 14.5px; line-height: 1.4; }
        .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }
        .balance-card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .points-value { font-size: 42px; font-weight: 700; color: #0f172a; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .action-card { border-radius: 18px; padding: 20px; text-align: center; cursor: pointer; }
        .action-card.restaurant { background: #166534; color: white; }
        .action-card.bitcoin { background: white; color: #0d3b2e; border: 1px solid #e2e8f0; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 8px 0; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">∞</div>
            <div><div style="font-size:22px;font-weight:700;">Soberana</div></div>
        </div>
        <div class="header-right">
            <div class="name">Pedro</div>
            <div class="since">Cliente desde 2024</div>
        </div>
    </div>

    <div class="success-banner">
        <div class="icon">📷</div>
        <div class="content">
            <strong>QR Code escaneado com sucesso</strong><br>
            Pagamento da Mesa 17 confirmado • <strong>+142 pontos</strong>
        </div>
    </div>

    <div class="container">
        <div class="balance-card">
            <div>Seu saldo atual</div>
            <div class="points-value" id="points">1426</div>
            <div>prontos para resgate</div>
        </div>

        <div style="margin:20px 0; font-size:15px;">
            Seus pontos viram desconto no seu restaurante preferido.
        </div>

        <div class="actions">
            <div class="action-card restaurant" onclick="alert('Desconto ativado!')">
                <div style="font-size:32px;">🏷️</div>
                <div><strong>Descontos no restaurante</strong></div>
            </div>
            <div class="action-card bitcoin" onclick="alert('Resgate Lightning em breve')">
                <div style="font-size:32px;">₿</div>
                <div><strong>Bitcoin Lightning</strong></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav" style="display:flex;justify-content:space-around;padding:10px;background:white;border-top:1px solid #ddd;">
        <div>🏠 Início</div>
        <div>🕒 Histórico</div>
        <div>👤 Perfil</div>
    </div>
</body>
</html>
